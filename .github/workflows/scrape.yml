name: twidouga scraper

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: twidouga-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: error
        options: >-
          --health-cmd "curl -sf http://localhost:8191/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: twidouga-scraper/package.json

      - name: Install dependencies
        working-directory: twidouga-scraper
        run: npm ci

      - name: Run scraper
        working-directory: twidouga-scraper
        env:
          XFEED_URL:                 ${{ secrets.XFEED_URL }}
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FLARESOLVERR_URL:          http://localhost:8191
        run: node twidouga-scraper.cjs
