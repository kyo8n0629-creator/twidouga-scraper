name: twidouga scraper

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: twidouga-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ★ Puppeteer の install スクリプトを明示的に実行してChromiumをダウンロード
      - name: Install Chromium for Puppeteer
        run: node node_modules/puppeteer/install.mjs

      - name: Verify Chromium
        run: |
          ls -la ${{ github.workspace }}/.cache/puppeteer/chrome/ || echo "WARN: chrome dir missing"

      - name: Run scraper
        env:
          XFEED_URL:                 ${{ secrets.XFEED_URL }}
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HEADLESS: 'true'
          LOG_LEVEL: 'info'
        run: npm start
