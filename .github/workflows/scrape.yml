name: twidouga scraper

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: twidouga-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Puppeteer 23+ は npm install 時にChromiumを自動ダウンロード
      - name: Install dependencies (Chromium auto-download)
        run: npm install
        env:
          PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer

      # 確認用（失敗してもジョブは続行）
      - name: Verify Chromium
        run: ls -la ${{ github.workspace }}/.cache/puppeteer || true

      - name: Run scraper
        env:
          XFEED_URL:                 ${{ secrets.XFEED_URL }}
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUPPETEER_CACHE_DIR:       ${{ github.workspace }}/.cache/puppeteer
          HEADLESS: 'true'
          LOG_LEVEL: 'info'
        run: npm start
