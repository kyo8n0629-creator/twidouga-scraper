name: twidouga scraper

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: twidouga-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: error
        options: >-
          --health-cmd "curl -sf http://localhost:8191/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run scraper
        env:
          XFEED_URL:                 ${{ secrets.XFEED_URL }}
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FLARESOLVERR_URL:          http://localhost:8191
        run: node twidouga-scraper.js

      - name: Checkout xfeed
        uses: actions/checkout@v4
        with:
          repository: kyo8n0629-creator/xfeed
          token: ${{ secrets.GH_PAT }}
          path: xfeed

      - name: Install xfeed dependencies
        working-directory: xfeed
        run: npm ci

      - name: Rebuild cache from Turso
        working-directory: xfeed
        run: npm run build:cache:turso
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}
          CACHE_MAX_ITEMS:    "2000"
          CACHE_HOME_ITEMS:   "500"

      - name: Upload cache to R2
        working-directory: xfeed
        run: npm run upload:cache:r2
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
